services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  honeypot:
    build: .
    image: ai-honeypot:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CONFIG_PATH: /config/config.yaml
    volumes:
      - ./data:/data
      - ./config.yaml:/config/config.yaml:ro
    ports:
      - "8888:8888"
    command: ["uvicorn", "honeypot.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8888"]

  dashboard:
    image: ai-honeypot:latest
    restart: unless-stopped
    depends_on:
      - honeypot
    environment:
      CONFIG_PATH: /config/config.yaml
    volumes:
      - ./data:/data
      - ./config.yaml:/config/config.yaml:ro
    ports:
      - "8080:8080"
    command: ["uvicorn", "dashboard.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8080"]
